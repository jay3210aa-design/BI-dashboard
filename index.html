<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生產進度 Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #f5f7fa; --card-bg: #fff; --border: #e2e8f0;
  --text: #1a202c; --text-sub: #718096;
  --pill-bg: #edf2f7; --pill-text: #4a5568;
  --input-bg: #fff; --shadow: 0 1px 4px rgba(0,0,0,0.08);
  --accent: #3182ce; --progress-bg: #e2e8f0;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1a202c; --card-bg: #2d3748; --border: #4a5568;
    --text: #e2e8f0; --text-sub: #a0aec0;
    --pill-bg: #4a5568; --pill-text: #e2e8f0;
    --input-bg: #2d3748; --shadow: 0 1px 4px rgba(0,0,0,0.35);
    --accent: #63b3ed; --progress-bg: #4a5568;
  }
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px; min-height: 100vh; zoom: 1.3;
}

/* Header */
.header {
  background: var(--card-bg); border-bottom: 1px solid var(--border);
  padding: 10px 20px; display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px;
}
.header h1 { font-size: 17px; font-weight: 700; }
.header-date { color: var(--text-sub); font-size: 12px; }
.date-picker-wrap { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.date-picker-wrap span { font-size: 12px; color: var(--text-sub); font-weight: 600; }
.date-picker-wrap input[type=date] {
  padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--input-bg); color: var(--text); font-size: 12px; cursor: pointer;
}
.date-picker-wrap input[type=date]:focus { outline: none; border-color: var(--accent); }
.btn-today {
  padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--pill-bg); color: var(--text); font-size: 12px; cursor: pointer; font-weight: 600;
}
.btn-today:hover { border-color: var(--accent); color: var(--accent); }

/* Tabs */
.tabs {
  background: var(--card-bg); border-bottom: 1px solid var(--border);
  padding: 0 16px; display: flex;
}
.tab-btn {
  padding: 10px 18px; border: none; background: none;
  color: var(--text-sub); font-size: 13px; cursor: pointer;
  border-bottom: 2px solid transparent; font-weight: 500;
  transition: all 0.15s;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Container */
.container { max-width: 1200px; margin: 0 auto; padding: 18px 16px; }

/* Upload */
.upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
@media (max-width: 560px) { .upload-row { grid-template-columns: 1fr; } }
.upload-box {
  background: var(--card-bg); border: 2px dashed var(--border);
  border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: border-color 0.15s;
}
.upload-box:hover { border-color: var(--accent); }
.upload-box.loaded { border-style: solid; border-color: #38a169; }
.upload-box label { cursor: pointer; display: flex; align-items: center; gap: 12px; }
.upload-box input[type=file] { display: none; }
.upload-icon { font-size: 26px; flex-shrink: 0; }
.upload-title { font-weight: 600; font-size: 13px; }
.upload-hint { color: var(--text-sub); font-size: 11px; margin-top: 2px; }
.upload-status { font-size: 11px; margin-top: 3px; color: #38a169; font-weight: 600; }

/* Summary */
.summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 18px; }
@media (max-width: 600px) { .summary-grid { grid-template-columns: repeat(2,1fr); } }
.summary-card {
  background: var(--card-bg); border-radius: 10px; padding: 14px 16px;
  box-shadow: var(--shadow); text-align: center;
}
.summary-card .num { font-size: 30px; font-weight: 800; line-height: 1; }
.summary-card .lbl { font-size: 11px; color: var(--text-sub); margin-top: 5px; }
.c-blue { color: #3182ce; } .c-green { color: #38a169; }
.c-yellow { color: #d69e2e; } .c-red { color: #e53e3e; }

/* Cards grid */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 14px; }
.empty-msg { text-align: center; color: var(--text-sub); padding: 40px; grid-column: 1/-1; }

/* Rule card */
.rule-card {
  background: var(--card-bg); border-radius: 10px; box-shadow: var(--shadow);
  display: flex; overflow: hidden;
}
.card-stripe { width: 5px; flex-shrink: 0; }
.card-stripe.green { background: #38a169; }
.card-stripe.yellow { background: #d69e2e; }
.card-stripe.red { background: #e53e3e; }
.card-stripe.gray { background: #a0aec0; }
.card-body { flex: 1; padding: 13px 14px; min-width: 0; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 9px; }
.pill-row { display: flex; flex-wrap: wrap; gap: 4px; }
.pill {
  display: inline-block; padding: 2px 8px; border-radius: 99px;
  font-size: 11px; font-weight: 600; background: var(--pill-bg); color: var(--pill-text);
}
.pill.owner { background: #ebf8ff; color: #2b6cb0; }
.pill.lead  { background: #f0fff4; color: #276749; }
.pill.part  { background: #faf5ff; color: #6b46c1; }
@media (prefers-color-scheme: dark) {
  .pill.owner { background: #1e3a5f; color: #90cdf4; }
  .pill.lead  { background: #1a3929; color: #9ae6b4; }
  .pill.part  { background: #2d1f4e; color: #d6bcfa; }
}
/* WIP section */
.wip-section { margin-bottom: 8px; }
.section-divider { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

/* Per-date output rows */
.date-rows { display: flex; flex-direction: column; gap: 5px; }
.date-row { display: grid; grid-template-columns: 40px 1fr 60px 44px 44px; gap: 6px; align-items: center; }
.date-lbl { font-size: 11px; color: var(--text-sub); font-weight: 600; }
.mini-bar { height: 5px; background: var(--progress-bg); border-radius: 3px; overflow: hidden; }
.mini-fill { height: 100%; border-radius: 3px; }
.mini-fill.green  { background: #38a169; }
.mini-fill.yellow { background: #d69e2e; }
.mini-fill.red    { background: #e53e3e; }
.mini-fill.gray   { background: #a0aec0; }
.date-qty { font-size: 10px; color: var(--text-sub); text-align: right; }
.date-pct { font-size: 12px; font-weight: 700; text-align: right; }
.date-pct.green  { color: #38a169; }
.date-pct.yellow { color: #d69e2e; }
.date-pct.red    { color: #e53e3e; }
.date-pct.gray   { color: #a0aec0; }
.date-badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 700; text-align: center; }
.badge { display: inline-block; padding: 2px 9px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.badge.green  { background: #c6f6d5; color: #276749; }
.badge.yellow { background: #fefcbf; color: #975a16; }
.badge.red    { background: #fed7d7; color: #c53030; }
.badge.gray   { background: var(--pill-bg); color: var(--text-sub); }
@media (prefers-color-scheme: dark) {
  .badge.green  { background: #1c4532; color: #9ae6b4; }
  .badge.yellow { background: #44380e; color: #f6e05e; }
  .badge.red    { background: #4a1515; color: #fc8181; }
}
.wip-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.wip-tag {
  padding: 2px 6px; border-radius: 4px; font-size: 10px;
  background: var(--progress-bg); color: var(--text-sub);
}
.wip-tag.active { color: var(--text); font-weight: 700; }

/* Note */
.card-note-wrap { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 7px; }
.card-note {
  width: 100%; padding: 5px 8px; border: 1px solid var(--border); border-radius: 5px;
  background: var(--input-bg); color: var(--text); font-size: 12px;
  resize: none; line-height: 1.4; font-family: inherit;
}
.card-note:focus { outline: none; border-color: var(--accent); }
.card-note::placeholder { color: var(--text-sub); }

/* Rules tab */
.rules-section {
  background: var(--card-bg); border-radius: 10px; box-shadow: var(--shadow);
  padding: 18px; margin-bottom: 18px;
}
.rules-section h2 { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
.form-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 11px; color: var(--text-sub); font-weight: 600; text-transform: uppercase; }
.form-group input {
  padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--input-bg); color: var(--text); font-size: 13px;
  width: 100%;
}
.form-group input:focus { outline: none; border-color: var(--accent); }
.fg-owner { flex: 0 0 120px; }
.fg-lead  { flex: 0 0 120px; }
.fg-part  { flex: 1 1 160px; }
.fg-qty   { flex: 0 0 130px; }
.btn {
  padding: 7px 16px; border: none; border-radius: 6px;
  cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity 0.15s; white-space: nowrap;
}
.btn:hover { opacity: 0.83; }
.btn-primary { background: #3182ce; color: #fff; }
.btn-danger  { background: #e53e3e; color: #fff; }
.btn-edit    { background: var(--pill-bg); color: var(--text); }
.btn-sm      { padding: 4px 10px; font-size: 12px; }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left; font-size: 11px; color: var(--text-sub);
  padding: 6px 10px; border-bottom: 2px solid var(--border);
  text-transform: uppercase; font-weight: 700; white-space: nowrap;
}
td { padding: 9px 10px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(0,0,0,0.02); }
@media (prefers-color-scheme: dark) { tr:hover td { background: rgba(255,255,255,0.03); } }
td input {
  width: 100%; padding: 4px 8px; border: 1px solid var(--accent);
  border-radius: 4px; background: var(--input-bg); color: var(--text); font-size: 13px;
}
.actions { white-space: nowrap; display: flex; gap: 5px; }
</style>
</head>
<body>

<div class="header">
  <h1>📊 生產進度 Dashboard</h1>
  <div class="date-picker-wrap">
    <span>Output 日期</span>
    <input type="date" id="dateStart" onchange="changeRange()">
    <span>～</span>
    <input type="date" id="dateEnd" onchange="changeRange()">
    <button class="btn-today" onclick="resetToToday()">今日</button>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" id="tab-btn-dashboard" onclick="switchTab('dashboard',this)">📈 進度追蹤</button>
  <button class="tab-btn" id="tab-btn-rules" onclick="switchTab('rules',this)">⚙️ 規則設定</button>
</div>

<!-- ── Dashboard ── -->
<div class="tab-content active" id="tab-dashboard">
  <div class="container">

    <div class="upload-row">
      <div class="upload-box" id="box-output">
        <label>
          <input type="file" accept=".xlsx,.xls" onchange="loadOutput(this)">
          <div class="upload-icon">📥</div>
          <div>
            <div class="upload-title">Output 檔</div>
            <div class="upload-hint">BinData_Yield.xlsx</div>
            <div class="upload-status" id="status-output"></div>
          </div>
        </label>
      </div>
      <div class="upload-box" id="box-wip">
        <label>
          <input type="file" accept=".xlsx,.xls" onchange="loadWip(this)">
          <div class="upload-icon">📋</div>
          <div>
            <div class="upload-title">WIP 檔</div>
            <div class="upload-hint">WipCustomer_Wip.xls / .xlsx</div>
            <div class="upload-status" id="status-wip"></div>
          </div>
        </label>
      </div>
    </div>

    <div class="summary-grid">
      <div class="summary-card"><div class="num c-blue" id="sum-total">–</div><div class="lbl">追蹤項目</div></div>
      <div class="summary-card"><div class="num c-green" id="sum-ok">–</div><div class="lbl">達標（≥85%）</div></div>
      <div class="summary-card"><div class="num c-yellow" id="sum-warn">–</div><div class="lbl">注意（70–84%）</div></div>
      <div class="summary-card"><div class="num c-red" id="sum-bad">–</div><div class="lbl">落後（&lt;70%）</div></div>
    </div>

    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn btn-primary" onclick="exportExcel()">⬇ 匯出 Excel</button>
    </div>
    <div class="cards-grid" id="cards-grid"></div>
  </div>
</div>

<!-- ── Rules ── -->
<div class="tab-content" id="tab-rules">
  <div class="container">

    <div class="rules-section">
      <h2>新增規則</h2>
      <div class="form-row">
        <div class="form-group fg-owner">
          <label>Owner *</label>
          <input type="text" id="new-owner" placeholder="如 NV">
        </div>
        <div class="form-group fg-lead">
          <label>Lead *</label>
          <input type="text" id="new-lead" placeholder="如 DD2">
        </div>
        <div class="form-group fg-part">
          <label>Part No.（選填，支援 *）</label>
          <input type="text" id="new-part" placeholder="如 GAA112*、*NB25I">
        </div>
        <div class="form-group fg-qty">
          <label>每日目標量（K）*</label>
          <input type="number" id="new-target" placeholder="如 70" min="0.1" step="0.1">
        </div>
        <button class="btn btn-primary" onclick="addRule()">＋ 新增</button>
      </div>
    </div>

    <div class="rules-section">
      <h2>規則列表</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th><th>Owner</th><th>Lead</th><th>Part No.</th><th>每日目標量</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="rules-tbody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
// ── Constants ───────────────────────────────────────────
const WIP_ST    = ['x30','x40','x50','x60','x70'];
const WIP_LABEL = { x30:'x30', x40:'x40', x50:'x50', x60:'x60', x70:'x70' };

// ── Today ───────────────────────────────────────────────
const _now = new Date();
const todayStr = _now.getFullYear() + '/' +
  String(_now.getMonth()+1).padStart(2,'0') + '/' +
  String(_now.getDate()).padStart(2,'0');
// HTML date input 用 YYYY-MM-DD
const todayInputVal = _now.getFullYear() + '-' +
  String(_now.getMonth()+1).padStart(2,'0') + '-' +
  String(_now.getDate()).padStart(2,'0');

// ── State ───────────────────────────────────────────────
let rules = [];
let allOutputRows = [];  // 完整資料（不篩日期）
let outputRows = [];     // 篩選後
let wipRows = [];
let hasOutput = false;
let hasWip = false;
let selectedDate = todayStr;  // 格式 YYYY/MM/DD

// ── Date range init ──────────────────────────────────────
let rangeStart = todayStr;  // YYYY/MM/DD
let rangeEnd   = todayStr;

document.getElementById('dateStart').value = todayInputVal;
document.getElementById('dateEnd').value   = todayInputVal;

function changeRange() {
  const s = document.getElementById('dateStart').value;
  const e = document.getElementById('dateEnd').value;
  if (s) rangeStart = s.replace(/-/g, '/');
  if (e) rangeEnd   = e.replace(/-/g, '/');
  if (rangeStart > rangeEnd) rangeEnd = rangeStart;  // 防止起>迄
  if (hasOutput) updateOutputStatus();
  render();
}
function resetToToday() {
  document.getElementById('dateStart').value = todayInputVal;
  document.getElementById('dateEnd').value   = todayInputVal;
  rangeStart = rangeEnd = todayStr;
  if (hasOutput) updateOutputStatus();
  render();
}
function getDatesInRange() {
  const all = [...new Set(allOutputRows.map(r => toDateStr(getVal(r,'Date','date','DATE'))))];
  return all.filter(d => d >= rangeStart && d <= rangeEnd).sort();
}
function updateOutputStatus() {
  const avail = [...new Set(allOutputRows.map(r => toDateStr(getVal(r,'Date','date','DATE'))))].sort().join('、');
  const inRange = getDatesInRange();
  document.getElementById('status-output').innerHTML =
    `✓ 共 ${allOutputRows.length.toLocaleString()} 列，區間內 ${inRange.length} 天<br>` +
    `<span style="color:var(--text-sub);font-size:10px">檔案含日期：${avail || '–'}</span>`;
}

// ── Persist ─────────────────────────────────────────────
function saveRules() { localStorage.setItem('prod_rules_v2', JSON.stringify(rules)); }
function loadRulesLS() {
  try { rules = JSON.parse(localStorage.getItem('prod_rules_v2')) || []; } catch { rules = []; }
}

// ── Notes ────────────────────────────────────────────────
let notes = {};
function noteKey(rule) { return `${rule.owner}|${rule.lead}|${rule.part}`; }
function saveNote(key, val) {
  notes[key] = val;
  localStorage.setItem('prod_notes_v1', JSON.stringify(notes));
}
function loadNotes() {
  try { notes = JSON.parse(localStorage.getItem('prod_notes_v1')) || {}; } catch { notes = {}; }
}

// ── Tab ─────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── Helpers ─────────────────────────────────────────────
function toDateStr(val) {
  if (!val) return '';
  if (val instanceof Date) {
    return val.getFullYear() + '/' +
      String(val.getMonth()+1).padStart(2,'0') + '/' +
      String(val.getDate()).padStart(2,'0');
  }
  return String(val).trim().substring(0, 10);
}

function toK(n, int = false) {
  if (n === 0) return '0K';
  const k = n / 1000;
  if (int) return Math.round(k).toLocaleString() + 'K';
  const rounded = Math.round(k * 10) / 10;
  return rounded.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 1 }) + 'K';
}

// 不區分大小寫的欄位取值
function getVal(row, ...names) {
  for (const name of names) {
    if (row[name] !== undefined && row[name] !== '') return row[name];
  }
  // fallback: case-insensitive
  const keys = Object.keys(row);
  for (const name of names) {
    const k = keys.find(k => k.trim().toLowerCase() === name.toLowerCase());
    if (k !== undefined && row[k] !== '') return row[k];
  }
  return '';
}

function globMatch(pattern, str) {
  if (!pattern) return true;
  const escaped = pattern.replace(/[.+^${}()|[\]\\]/g, '\\$&').replace(/\*/g, '.*');
  return new RegExp('^' + escaped + '$', 'i').test(str || '');
}

function matchRule(rule, owner, lead, product) {
  if ((rule.owner || '').toLowerCase() !== (owner || '').toLowerCase()) return false;
  if ((rule.lead  || '').toLowerCase() !== (lead  || '').toLowerCase()) return false;
  if (rule.part && !globMatch(rule.part, product)) return false;
  return true;
}

function statusOf(pct) {
  if (pct >= 85) return 'green';
  if (pct >= 70) return 'yellow';
  return 'red';
}
function labelOf(sc) {
  return { green:'正常', yellow:'注意', red:'落後', gray:'待資料' }[sc];
}

// ── File loading ────────────────────────────────────────
function loadOutput(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type:'array', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws, { defval: '' });
      allOutputRows = data;
      outputRows = allOutputRows.filter(r => toDateStr(getVal(r,'Date','date','DATE')) === selectedDate);
      hasOutput = true;
      updateOutputStatus();
      document.getElementById('box-output').classList.add('loaded');
      render();
    } catch(err) {
      document.getElementById('status-output').textContent = '⚠ 解析失敗：' + err.message;
    }
  };
  reader.readAsArrayBuffer(file);
}

function loadWip(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type:'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      wipRows = XLSX.utils.sheet_to_json(ws, { defval: '' });
      hasWip = true;
      document.getElementById('status-wip').textContent =
        `✓ 共 ${wipRows.length.toLocaleString()} 列`;
      document.getElementById('box-wip').classList.add('loaded');
      render();
    } catch(err) {
      document.getElementById('status-wip').textContent = '⚠ 解析失敗：' + err.message;
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── Compute per rule ────────────────────────────────────
function compute(rule) {
  // Output: per-date breakdown
  const dates = getDatesInRange();
  const byDate = dates.map(date => {
    let done = 0;
    for (const r of allOutputRows) {
      if (toDateStr(getVal(r,'Date','date','DATE')) === date &&
          matchRule(rule, getVal(r,'Owner'), getVal(r,'Lead'), getVal(r,'Product'))) {
        done += Number(getVal(r,'Pass_qty','pass_qty')) || 0;
      }
    }
    return { date, done };
  });
  // WIP: current snapshot
  const wip = {};
  WIP_ST.forEach(s => wip[s] = 0);
  wip['其他'] = 0;
  for (const r of wipRows) {
    if (matchRule(rule, getVal(r,'Owner'), getVal(r,'Lead'), getVal(r,'Device'))) {
      const st = String(getVal(r,'Status') || '').trim();
      if (WIP_ST.includes(st)) wip[st] += Number(getVal(r,'Qty') || 0);
      else wip['其他'] += Number(getVal(r,'Qty') || 0);
    }
  }
  return { byDate, wip };
}

// ── Render Dashboard ────────────────────────────────────
function render() {
  const grid = document.getElementById('cards-grid');
  const dataLoaded = hasOutput || hasWip;

  document.getElementById('sum-total').textContent = rules.length || '–';

  if (rules.length === 0) {
    grid.innerHTML = '<div class="empty-msg">請先在「規則設定」新增追蹤規則，再上傳資料檔案。</div>';
    document.getElementById('sum-ok').textContent = '–';
    document.getElementById('sum-warn').textContent = '–';
    document.getElementById('sum-bad').textContent = '–';
    return;
  }

  let ok = 0, warn = 0, bad = 0;

  grid.innerHTML = rules.map(rule => {
    const { byDate, wip } = compute(rule);

    // WIP tags
    const wipTagsHtml = WIP_ST.map(s => {
      const q = wip[s];
      return `<span class="wip-tag${q > 0 ? ' active' : ''}">${WIP_LABEL[s]} ${toK(q, true)}</span>`;
    }).join('');
    const otherHtml = wip['其他'] > 0
      ? `<span class="wip-tag active">其他 ${toK(wip['其他'], true)}</span>` : '';

    // Per-date rows + worst status
    let worstSc = 'gray';
    const priority = { red:3, yellow:2, green:1, gray:0 };
    const dateRowsHtml = !hasOutput ? '' : byDate.length === 0
      ? `<div style="font-size:11px;color:var(--text-sub);padding:2px 0">此區間無資料</div>`
      : byDate.map(({ date, done }) => {
          const rawPct = rule.target > 0 ? done / (rule.target * 1000) * 100 : 0;
          const sc = statusOf(rawPct);
          if (priority[sc] > priority[worstSc]) worstSc = sc;
          const pctCap = Math.min(100, rawPct);
          const mmdd = date.substring(5);  // MM/DD
          return `
          <div class="date-row">
            <span class="date-lbl">${mmdd}</span>
            <div class="mini-bar"><div class="mini-fill ${sc}" style="width:${pctCap}%"></div></div>
            <span class="date-qty">${toK(done)}/${rule.target}K</span>
            <span class="date-pct ${sc}">${rawPct.toFixed(1)}%</span>
            <span class="badge ${sc} date-badge">${labelOf(sc)}</span>
          </div>`;
        }).join('');

    const nk = noteKey(rule);
    const stripeSc = hasOutput && byDate.length ? worstSc : 'gray';
    if (hasOutput && byDate.length) {
      if (stripeSc==='green') ok++;
      else if (stripeSc==='yellow') warn++;
      else bad++;
    }

    return `
    <div class="rule-card">
      <div class="card-stripe ${stripeSc}"></div>
      <div class="card-body">
        <div class="card-top" style="margin-bottom:6px">
          <div class="pill-row">
            <span class="pill owner">${escHtml(rule.owner)}</span>
            <span class="pill lead">${escHtml(rule.lead)}</span>
            <span class="pill part">${rule.part ? escHtml(rule.part) : '所有型號'}</span>
          </div>
        </div>
        <div class="wip-section"><div class="wip-tags">${wipTagsHtml}${otherHtml}</div></div>
        ${hasOutput ? `<hr class="section-divider"><div class="date-rows">${dateRowsHtml}</div>` : ''}
        <div class="card-note-wrap">
          <textarea class="card-note" rows="4" placeholder="備註異常狀況…"
            oninput="saveNote('${escHtml(nk)}', this.value)"
          >${escHtml(notes[nk] || '')}</textarea>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('sum-ok').textContent   = hasOutput ? ok   : '–';
  document.getElementById('sum-warn').textContent = hasOutput ? warn : '–';
  document.getElementById('sum-bad').textContent  = hasOutput ? bad  : '–';
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Rules CRUD ──────────────────────────────────────────
function renderRules() {
  const tbody = document.getElementById('rules-tbody');
  if (rules.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">尚無規則，請新增第一條。</td></tr>';
    return;
  }
  tbody.innerHTML = rules.map((r, i) => `
    <tr id="rule-row-${i}">
      <td style="color:var(--text-sub)">${i+1}</td>
      <td>${escHtml(r.owner)}</td>
      <td>${escHtml(r.lead)}</td>
      <td>${r.part ? escHtml(r.part) : '<span style="color:var(--text-sub)">所有型號</span>'}</td>
      <td>${r.target}K</td>
      <td><div class="actions">
        <button class="btn btn-edit btn-sm" onclick="editRule(${i})">編輯</button>
        <button class="btn btn-danger btn-sm" onclick="deleteRule(${i})">刪除</button>
      </div></td>
    </tr>`).join('');
}

function addRule() {
  const owner  = document.getElementById('new-owner').value.trim();
  const lead   = document.getElementById('new-lead').value.trim();
  const part   = document.getElementById('new-part').value.trim();
  const target = parseFloat(document.getElementById('new-target').value);
  if (!owner)               { alert('請填寫 Owner'); return; }
  if (!lead)                { alert('請填寫 Lead');  return; }
  if (!target || target <= 0) { alert('請填寫每日目標量（需 > 0）'); return; }
  rules.push({ owner, lead, part, target });
  saveRules();
  document.getElementById('new-owner').value  = '';
  document.getElementById('new-lead').value   = '';
  document.getElementById('new-part').value   = '';
  document.getElementById('new-target').value = '';
  renderRules();
  render();
}

function deleteRule(i) {
  if (!confirm(`確定刪除規則「${rules[i].owner} / ${rules[i].lead}」？`)) return;
  rules.splice(i, 1);
  saveRules();
  renderRules();
  render();
}

function editRule(i) {
  const r = rules[i];
  document.getElementById('rule-row-' + i).innerHTML = `
    <td style="color:var(--text-sub)">${i+1}</td>
    <td><input value="${escHtml(r.owner)}" id="e-owner-${i}"></td>
    <td><input value="${escHtml(r.lead)}"  id="e-lead-${i}"></td>
    <td><input value="${escHtml(r.part)}"  id="e-part-${i}" placeholder="空白=所有型號"></td>
    <td><input type="number" value="${r.target}" id="e-target-${i}" min="0.1" step="0.1" style="width:90px"></td>
    <td><div class="actions">
      <button class="btn btn-primary btn-sm" onclick="saveEdit(${i})">儲存</button>
      <button class="btn btn-edit btn-sm"    onclick="renderRules()">取消</button>
    </div></td>`;
}

function saveEdit(i) {
  const owner  = document.getElementById('e-owner-' + i).value.trim();
  const lead   = document.getElementById('e-lead-'  + i).value.trim();
  const part   = document.getElementById('e-part-'  + i).value.trim();
  const target = parseFloat(document.getElementById('e-target-' + i).value);
  if (!owner || !lead || !target || target <= 0) { alert('請填寫必填欄位'); return; }
  rules[i] = { owner, lead, part, target };
  saveRules();
  renderRules();
  render();
}

// ── Export ──────────────────────────────────────────────
function exportExcel() {
  const headers = ['Owner','Lead','Part No.','每日目標(K)','日期','產出(K)','達成率%','狀態',
                   'WIP x30','WIP x40','WIP x50','WIP x60','WIP x70','WIP 其他','備註'];
  const rows = [headers];

  rules.forEach(rule => {
    const { byDate, wip } = compute(rule);
    const nk = noteKey(rule);
    const noteVal = notes[nk] || '';
    const wipVals = WIP_ST.map(s => Math.round(wip[s] / 1000 * 10) / 10)
                          .concat([Math.round(wip['其他'] / 1000 * 10) / 10]);

    if (byDate.length === 0) {
      // 無 Output 資料，只輸出 WIP
      rows.push([rule.owner, rule.lead, rule.part || '所有型號', rule.target,
                 '–', '–', '–', '–', ...wipVals, noteVal]);
    } else {
      byDate.forEach(({ date, done }, di) => {
        const rawPct = rule.target > 0 ? done / (rule.target * 1000) * 100 : 0;
        const sc = statusOf(rawPct);
        rows.push([
          rule.owner, rule.lead, rule.part || '所有型號', rule.target,
          date,
          Math.round(done / 1000 * 10) / 10,
          Math.round(rawPct * 10) / 10,
          labelOf(sc),
          // WIP only on first date row to avoid repetition
          ...(di === 0 ? wipVals : WIP_ST.map(() => '').concat([''])),
          di === 0 ? noteVal : ''
        ]);
      });
    }
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);
  // 欄寬
  ws['!cols'] = [10,10,16,12,12,10,10,8,10,10,10,10,10,10,30].map(w => ({ wch: w }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '生產進度');
  const dateTag = rangeStart === rangeEnd ? rangeStart.replace(/\//g,'-')
                : `${rangeStart.replace(/\//g,'-')}_${rangeEnd.replace(/\//g,'-')}`;
  XLSX.writeFile(wb, `生產進度_${dateTag}.xlsx`);
}

// ── Init ────────────────────────────────────────────────
loadRulesLS();
loadNotes();
renderRules();
render();
</script>
